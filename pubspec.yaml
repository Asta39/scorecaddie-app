name: score_caddie
description: "ScoreCaddie — Golf scoring, analytics & handicap tracker for Kenyan courses."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Local database (offline-first)
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # Charts
  fl_chart: ^0.70.2
  
  # UI
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  screenshot: ^3.0.0
  
  # Sharing & Export
  share_plus: ^10.1.4
  csv: ^6.0.0
  
  # Realtime & Backend
  supabase_flutter: ^2.8.1
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.3
  connectivity_plus: ^6.1.3
  image_picker: ^1.2.1
  image: ^4.5.2
  mobile_scanner: ^6.0.0
  pdfx: ^2.9.1
  font_awesome_flutter: ^10.8.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  
  # Video recording (practice shots + OCR scanner)
  video_player: ^2.9.1
  video_thumbnail: ^0.5.3
  url_launcher: ^6.3.2
  dio: ^5.9.2
  geolocator: ^13.0.1


  shared_preferences: ^2.5.5
  add_2_calendar: ^3.0.1
  record: ^6.2.0
  just_audio: ^0.10.5
  permission_handler: ^12.0.1
  http: ^1.6.0
  flutter_animate: ^4.5.2
  google_generative_ai: ^0.4.7
  lottie: ^3.3.3
  flutter_dotenv: ^5.2.1
  onesignal_flutter: ^5.6.0
  supabase: ^2.0.0
  rxdart: ^0.28.0
  lucide_icons_flutter: ^3.1.14+2
  flutter_credit_card: ^4.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  drift_dev: ^2.24.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5
  flutter_native_splash: ^2.4.7
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/final-logo-01.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/final-logo-01.png"
  adaptive_icon_foreground_scale: 1.5

flutter_native_splash:
  color: "#F5F5F9"
  image: assets/images/final-logo-01.png
  android_gravity: center
  ios_content_mode: center
  android_12:
    image: assets/images/final-logo-01.png
    color: "#F5F5F9"

