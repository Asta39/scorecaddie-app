name: score_caddie
description: "ScoreCaddie — Golf scoring, analytics & handicap tracker for Kenyan courses."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  google_sign_in: 6.2.2
  
  # Local database (offline-first)
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # Charts
  fl_chart: ^0.70.2
  
  # UI
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  qr_flutter: ^4.1.0
  screenshot: ^3.0.0
  
  # Sharing & Export
  share_plus: ^10.1.4
  csv: ^6.0.0
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.3
  connectivity_plus: ^6.1.3
  image_picker: ^1.2.1
  image: ^4.5.2
  flutter_local_notifications: ^18.0.1
  
  # AI Shot Analyzer
  camera: ^0.11.0+2
  video_player: ^2.9.1
  google_mlkit_pose_detection: ^0.11.0
  video_thumbnail: ^0.5.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  drift_dev: ^2.24.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#047857"
  adaptive_icon_foreground: "assets/images/app_icon.png"

